# This workflow will update package.json version and publish to npm when a release tag is pushed
# Uses trusted publishing (OIDC) — no NPM_TOKEN needed
name: Publish to npm

on:
  push:
    tags:
      - 'release-*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/release-}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: pnpm version ${{ steps.get_version.outputs.VERSION }} --no-git-tag-version

      - name: Install dependencies
        run: pnpm install

      - name: Commit version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json
          git commit -m "Update version to ${{ steps.get_version.outputs.VERSION }}" || exit 0
          git push origin HEAD:master

      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            Release ${{ steps.get_version.outputs.VERSION }}

            Published to npm: https://www.npmjs.com/package/react-highlight-me

            ## What's Changed
          generate_release_notes: true
          make_latest: true
